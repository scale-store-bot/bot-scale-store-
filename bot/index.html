<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bot – Analyse de Deals</title>

    <!-- IMAGE QUI S'AFFICHE SUR GOOGLE / DISCORD / WHATSAPP -->
    <meta property="og:title" content="Scale Store Bot">
    <meta property="og:description" content="Le bot officiel du Scale Store">
    <meta property="og:image" content="https://raw.githubusercontent.com/scale-store-bot/bot-scale-store-/main/BCO.4d35ed39-e5a0-475a-8730-72e6cdf6ebe4.png">
    <meta property="og:type" content="website">

    <!-- ICONES (onglet navigateur, mobile, SEO) -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/scale-store-bot/bot-scale-store-/main/BCO.4d35ed39-e5a0-475a-8730-72e6cdf6ebe4.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/scale-store-bot/bot-scale-store-/main/BCO.4d35ed39-e5a0-475a-8730-72e6cdf6ebe4.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Analyseur de Deals – Scale Store</h1>

<div class="filters">
    <label>Prix max d’achat :</label>
    <input type="number" id="maxPrice" placeholder="Ex: 50">

    <label>Marge minimum (€) :</label>
    <input type="number" id="minMargin" placeholder="Ex: 20">

    <label>Catégorie :</label>
    <select id="category">
        <option value="">Toutes</option>
        <option value="tech">Tech</option>
        <option value="mode">Mode</option>
        <option value="maison">Maison</option>
    </select>

    <button onclick="searchDeals()">Chercher les deals</button>
</div>

<div id="results"></div>

<script src="bot.js"></script>
</body>
</html>
